name: Require issue priority

# Every issue must carry a priority label (priority:low|medium|high|critical).
# GitHub can't block creation, so this flags any issue that lacks one and
# self-clears the flag once a priority is set.
on:
  issues:
    types: [opened, reopened, labeled, unlabeled]

permissions:
  issues: write

jobs:
  check-priority:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const FLAG = 'needs-priority';
            const num = context.payload.issue.number;
            const labels = (context.payload.issue.labels || []).map(l => l.name.toLowerCase());
            const hasPriority = labels.some(n =>
              /^priority[:/](low|medium|high|critical)$/.test(n) ||
              ['p0', 'p1', 'p2', 'p3', 'critical', 'urgent', 'high', 'medium', 'low', 'minor', 'normal'].includes(n)
            );
            if (hasPriority) {
              if (labels.includes(FLAG)) {
                await github.rest.issues.removeLabel({ ...context.repo, issue_number: num, name: FLAG }).catch(() => {});
              }
              return;
            }
            if (labels.includes(FLAG)) return;  // already flagged, don't repeat the comment
            await github.rest.issues.addLabels({ ...context.repo, issue_number: num, labels: [FLAG] });
            await github.rest.issues.createComment({
              ...context.repo, issue_number: num,
              body: 'This issue has no **priority** label. Please set one: `priority:low`, `priority:medium`, `priority:high`, or `priority:critical`.'
            });
