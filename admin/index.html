<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex"/>
<title>llm.hostbun.cc — control panel</title>
<style>
:root{
  --bg:#09090b;--card:#0c0c0f;--card2:#141417;--bd:#26262b;--fg:#fafafa;--mut:#a1a1aa;
  --acc:#3b82f6;--grn:#22c55e;--red:#ef4444;--amb:#f59e0b;--clr:#f97316;
  --ring:rgba(59,130,246,.35);--pri:#fafafa;--prifg:#18181b;--hover:#18181b;
}
*{box-sizing:border-box}
html,body{background:var(--bg)}
body{margin:0;color:var(--fg);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}
.hide{display:none!important}
.mut{color:var(--mut)} .mono{font:13px ui-monospace,Menlo,monospace}
h1{font-size:24px;margin:0} h2{font-size:16px;font-weight:600;margin:0 0 4px}
h3{margin:0 0 8px;font-size:15px;font-weight:600}
small.hint{color:var(--mut);font-size:12px;font-weight:400}
code{background:#1c1c20;border:1px solid var(--bd);border-radius:5px;padding:1px 6px;font:13px ui-monospace,Menlo,monospace}
/* ── layout ── */
.shell{display:grid;grid-template-columns:252px minmax(0,1fr);min-height:100vh}
.sidebar{position:sticky;top:0;align-self:start;height:100vh;background:var(--card);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:14px 12px;overflow-y:auto}
.sb-brand{display:flex;align-items:center;gap:10px;padding:6px 6px 14px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.sb-brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--acc),#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;flex:0 0 auto}
.sb-brand .t{font-weight:600;font-size:14px;line-height:1.15}
.sb-brand .s{font-size:11px;color:var(--mut)}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);padding:14px 10px 5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--mut);cursor:pointer;font-size:13.5px;font-weight:500;border:1px solid transparent}
.nav-item:hover{background:var(--hover);color:var(--fg);text-decoration:none}
.nav-item.on{background:#1c1c20;color:var(--fg);border-color:var(--bd)}
.nav-item svg{width:17px;height:17px;flex:0 0 auto}
.nav-item .badge{margin-left:auto;font:11px ui-monospace,monospace;padding:1px 7px;border-radius:8px;border:1px solid var(--bd);color:var(--mut)}
.sb-foot{border-top:1px solid var(--bd);padding-top:10px;margin-top:6px}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;padding:12px 22px}
.topbar h2{margin:0}
.topbar .crumb{color:var(--mut);font-size:13px}
.content{padding:22px 22px 90px;max-width:1180px;width:100%}
.hamb{display:none}
@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;z-index:50;width:252px;transform:translateX(-101%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.5)}
  .sidebar.open{transform:none}
  .hamb{display:inline-flex}
  .content{padding:18px 14px 80px}
}
/* ── primitives ── */
.card{background:var(--card2);border:1px solid var(--bd);border-radius:14px;padding:18px;margin:14px 0}
.card.acc{border-color:var(--acc)} .card.amb{border-color:var(--amb)}
input,select,textarea{background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--fg);padding:8px 10px;font:14px ui-monospace,Menlo,monospace;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--ring)}
label{display:block;font-size:13px;color:var(--mut);margin:10px 0 4px}
button{background:var(--pri);color:var(--prifg);border:0;border-radius:8px;padding:8px 14px;font:600 13px -apple-system,sans-serif;cursor:pointer}
button:hover{background:#e4e4e7}
button.ghost{background:transparent;color:var(--fg);border:1px solid var(--bd)}
button.ghost:hover{background:var(--hover)}
button.danger{background:transparent;color:var(--red);border:1px solid #7f1d1d}
button.danger:hover{background:#2a1112}
button.sm{padding:6px 10px;font-size:12px}
button:disabled{opacity:.4;cursor:not-allowed}
table{border-collapse:collapse;width:100%;margin:8px 0}
th,td{border:0;border-bottom:1px solid var(--bd);padding:9px 10px;text-align:left;vertical-align:middle;font-size:14px}
th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.03em;font-weight:600;cursor:default}
th.sortable{cursor:pointer} th.sortable.on{color:var(--acc)}
tr.click{cursor:pointer} tr.click:hover td{background:#1a212b}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.flex{display:flex;gap:8px;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.kv{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px}
.kv .n{font-size:12px;color:var(--mut)} .kv .v{font:600 19px ui-monospace,monospace;margin-top:3px}
.pill{display:inline-block;font:12px ui-monospace,monospace;padding:2px 9px;border-radius:8px;border:1px solid var(--bd);font-weight:600}
.up{color:var(--grn);border-color:var(--grn)} .down{color:var(--red);border-color:var(--red)} .warnp{color:var(--amb);border-color:var(--amb)}
.crazyrouter,.cloud{color:var(--acc);border-color:var(--acc)} .local{color:var(--grn);border-color:var(--grn)} .claudecode,.claude{color:var(--clr);border-color:var(--clr)} .blocked{color:var(--red);border-color:var(--red)} .images{color:#a855f7;border-color:#a855f7}
.chip{font:11px ui-monospace,monospace;padding:1px 6px;border-radius:10px;border:1px solid var(--bd);color:var(--mut)}
.seg{display:inline-flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.seg button{background:transparent;color:var(--mut);border:0;border-radius:0;padding:5px 11px;font:600 12px -apple-system,sans-serif}
.seg button.on{background:var(--acc);color:#04101f}
.wintabs{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 14px}
.wintabs button{background:#1c1c20;color:var(--mut);border:1px solid var(--bd)}
.wintabs button.on{background:var(--acc);color:#04101f;border-color:var(--acc)}
.bar{height:9px;border-radius:5px;background:#26262b;overflow:hidden;display:flex}
.bar>i{display:block;height:100%}
.lblrow{display:flex;align-items:center;gap:10px;margin:8px 0}
.lblrow .nm{flex:0 0 150px;font:13px ui-monospace,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lblrow .bar{flex:1}
.lblrow .vv{flex:0 0 auto;font:12px ui-monospace,monospace;color:var(--mut);min-width:170px;text-align:right}
.swatch{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
pre{background:#0b0b0e;border:1px solid var(--bd);border-radius:10px;padding:12px;overflow:auto;font:13px ui-monospace,monospace;white-space:pre-wrap;word-break:break-word;max-height:340px;margin:8px 0}
.warn{background:#241a06;border:1px solid #7c5306;border-radius:10px;padding:10px 14px;font-size:13px}
.banner{border-radius:12px;padding:12px 16px;margin:0 0 14px}
.banner.ok{border:1px solid var(--grn);background:#0f1f14}
.banner.bad{border:1px solid var(--amb);background:#1f1a0e}
.x{color:var(--red);cursor:pointer;font-weight:700;padding:0 6px}
details.adv>summary{cursor:pointer;color:var(--mut);font-size:14px;padding:8px 0;user-select:none;list-style:none}
details.adv>summary::-webkit-details-marker{display:none}
details.adv>summary::before{content:'▸ ';color:var(--acc)}
details.adv[open]>summary::before{content:'▾ '}
details.adv>summary:hover{color:var(--fg)}
/* ── login ── */
.login{max-width:360px;margin:12vh auto 0;text-align:center}
.login .card{padding:22px}
/* ── toast ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--bd);border-radius:10px;padding:11px 18px;opacity:0;transition:opacity .2s;z-index:99;max-width:90vw;pointer-events:none}
#toast.show{opacity:1}
/* ── drawer ── */
.dov{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.dov.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(720px,96vw);background:var(--card);border-left:1px solid var(--bd);transform:translateX(101%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:61;display:flex;flex-direction:column;box-shadow:-18px 0 54px rgba(0,0,0,.5)}
.drawer.open{transform:none}
.drawer-hd{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--bd)}
.drawer-bd{padding:16px 18px;overflow-y:auto;flex:1}
.dsec{margin:0 0 16px}
.dlbl{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--mut);font-weight:600;margin:0 0 6px}
.dmeta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.dmeta .kv{padding:9px 11px} .dmeta .kv .n{font-size:10.5px} .dmeta .kv .v{font-size:14px;margin-top:2px}
.msgbox{background:#0b0b0e;border:1px solid var(--bd);border-radius:10px;padding:12px;font:13px ui-monospace,Menlo,monospace;white-space:pre-wrap;word-break:break-word;max-height:42vh;overflow:auto}
</style></head>
<body>
<div id="root"></div>
<div id="toast"></div>

const nfmt = n => { n=+n||0; if(n>=1e9)return (n/1e9).toFixed(2)+'B'; if(n>=1e6)return (n/1e6).toFixed(2)+'M'; if(n>=1e3)return (n/1e3).toFixed(1)+'k'; return ''+Math.round(n); };
const usd = n => { n=+n||0; if(n===0)return '$0'; if(n<0.01)return '<$0.01'; return '$'+n.toFixed(n<10?2:0); };
const ago = ts => { if(!ts)return '—'; const s=(Date.now()-ts)/1000; if(s<60)return Math.round(s)+'s'; if(s<3600)return Math.round(s/60)+'m'; if(s<86400)return Math.round(s/3600)+'h'; return Math.round(s/86400)+'d'; };
const fmtMs = ms => { if(ms==null)return '—'; return ms>=1000?(ms/1000).toFixed(ms>=10000?0:1)+'s':Math.round(ms)+'ms'; };

/* ───────── stacked-bar time chart ───────── */
const METRIC_LABEL = {tok:'tokens',n:'calls',err:'errors'};
function buildChart(d, metric, opts){
  const pts=d.points||[], series=d.series||[]; const H=opts.H||240;
  const bm=d.bucketMs, bl=bm>=86400000?(bm/86400000+'d'):bm>=3600000?(bm/3600000+'h'):(bm/60000+'min');
  const hint=`— ${METRIC_LABEL[metric]} per ${bl} bucket${opts.by?', '+opts.by:''}`;
  if(!pts.length) return {svg:'<span class="mut">no data in window</span>',hint,legend:[]};
  const W=Math.max(560,pts.length*16+60), padL=52, padB=22, padT=10, plotH=H-padB-padT, plotW=W-padL-10;
  const field=metric==='tok'?'tok':'n';
  const stackVal=(p,name)=>metric==='err'?(name==='__err'?p.totalErr:0):(p[field][name]||0);
  const useSeries=metric==='err'?['__err']:series;
  const totals=pts.map(p=>useSeries.reduce((a,nm)=>a+stackVal(p,nm),0));
  const maxV=Math.max(1,...totals);
  const bw=Math.max(4,Math.min(26,(plotW/pts.length)-3));
  const x=i=>padL+i*(plotW/pts.length)+(plotW/pts.length-bw)/2;
  let g=''; for(let i=0;i<=4;i++){const yy=padT+plotH-(i/4*plotH);const vv=maxV*i/4;g+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-10}" y2="${yy.toFixed(1)}" stroke="#26262b"/><text x="${padL-6}" y="${(yy+3).toFixed(1)}" fill="#a1a1aa" font-size="10" text-anchor="end">${nfmt(vv)}</text>`;}
  let bars='';
  pts.forEach((p,i)=>{ let yacc=padT+plotH;
    useSeries.forEach((nm)=>{ const v=stackVal(p,nm); if(v<=0)return; const hh=v/maxV*plotH; yacc-=hh;
      const c=metric==='err'?'#ef4444':seriesColor(nm,series.indexOf(nm));
      bars+=`<rect x="${x(i).toFixed(1)}" y="${yacc.toFixed(1)}" width="${bw.toFixed(1)}" height="${hh.toFixed(1)}" fill="${c}" rx="1"><title>${fmtTime(p.t)}\n${nm==='__err'?'errors':nm}: ${v.toLocaleString()}</title></rect>`;
    });
  });
  let xl=''; const step=Math.max(1,Math.ceil(pts.length/6));
  pts.forEach((p,i)=>{ if(i%step)return; const t=new Date(p.t); const lab=bm<3600000?t.toISOString().slice(11,16):t.toISOString().slice(5,16).replace('T',' '); xl+=`<text x="${(x(i)+bw/2).toFixed(1)}" y="${H-6}" fill="#a1a1aa" font-size="10" text-anchor="middle">${lab}</text>`; });
  const svg=`<svg width="${W}" height="${H}" style="max-width:none">${g}${bars}${xl}</svg>`;
  const legend=metric==='err'?[{name:'errors',color:'#ef4444'}]:series.map((nm,i)=>({name:nm,color:seriesColor(nm,i)}));
  return {svg,hint,legend};
}
const Chart = ({data,metric,by,H}) => {
  const {svg,hint,legend}=useMemo(()=>buildChart(data,metric,{by,H}),[data,metric,by,H]);
  return html`<div>
    <div style="overflow-x:auto" dangerouslySetInnerHTML=${{__html:svg}}></div>
    <div class="flex" style="gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px">
      ${legend.map(l=>html`<span><span class="swatch" style="background:${l.color}"></span>${l.name}</span>`)}
    </div>
    <div class="mut" style="font-size:12px;margin-top:2px">${hint}</div>
  </div>`;
};

function Issues({health,st,state}){
  const probs=[];
  ['local','claudecode','crazyrouter'].forEach(l=>{ const r=health[l]; if(r&&!r.up) probs.push(['down',`Provider ${l} is DOWN (status ${r.status||'—'}). Traffic to it will fail.`]); });
  if(st&&st.byProvider){
    st.byProvider.forEach(r=>{ if(r.avg_ms>SLOW_MS) probs.push(['slow',`Provider ${r.provider} is slow — avg ${fmtMs(r.avg_ms)} over the last hour (${r.n} calls).`]); });
    if(st.windowJsonFails>0) probs.push(['refusal',`${st.windowJsonFails} JSON-enforce failure(s) in the last hour — usually a prose refusal, surfaced as 422. Not a proxy bug.`]);
    const otherErr=st.windowErrors-(st.windowJsonFails||0); const rate=st.windowCalls>0?otherErr/st.windowCalls:0;
    if(rate>0.05 && st.windowCalls>=20) probs.push(['err',`Non-refusal error rate ${(rate*100).toFixed(0)}% over the last hour (${otherErr}/${st.windowCalls}).`]);
  }
  if(state.forceModel&&state.forceModel.enabled) probs.push(['force',`Force-model is ON → every request rewritten to ${state.forceModel.provider}/${state.forceModel.model}.`]);
  const ic={down:'⛔',slow:'🐢',refusal:'🙅',err:'⚠️',force:'⏻'};
  if(!probs.length) return html`<div class="banner ok"><b style="color:var(--grn)">✓ All healthy</b> <span class="mut">— providers up, no slow providers or elevated errors in the last hour.</span></div>`;
  return html`<div class="banner bad"><b style="color:var(--amb)">${probs.length} thing${probs.length>1?'s':''} to look at</b>
    <ul style="margin:8px 0 0;padding-left:20px;list-style:none">${probs.map(([k,m])=>html`<li style="margin:5px 0">${ic[k]||'•'} ${m}</li>`)}</ul></div>`;
}

/* ───────── CALLS ───────── */
function Calls(){
  const {state,openCall,reload} = useApp();
  const [rows,setRows]=useState([]); const [total,setTotal]=useState(0); const [dbReady,setDbReady]=useState(true);
  const [pageSize,setPageSize]=useState(200); const [offset,setOffset]=useState(0);
  const [f,setF]=useState({q:'',model:'',project:'',provider:'',status:''});
  const [lg,setLg]=useState(()=>clone(state.logging));
  const [exporting,setExporting]=useState(false);
  useEffect(()=>{ setLg(clone(state.logging)); },[state.logging]);
  // load a page. off = row offset into the (filtered) result set.
  const load=useCallback(async(off=0)=>{
    const p=new URLSearchParams({limit:String(pageSize),offset:String(off)});
    Object.entries(f).forEach(([k,v])=>{ if(v&&v.trim())p.set(k,v.trim()); });
    try{ const d=await api('calls?'+p.toString()); setRows(d.rows||[]); setTotal(d.total||0); setDbReady(d.dbReady!==false); setOffset(off); }catch(e){}
  },[f,pageSize]);
  useEffect(()=>{ // seed project / q filter from URL on mount (set by Stats drilldowns)
    const sp=new URLSearchParams(window.location.search); const pr=sp.get('project'), qq=sp.get('q');
    if(pr||qq){ setF(x=>({...x,project:pr||'',q:qq||''})); }
  },[]);
  useEffect(()=>{ load(0); },[load]); // reload page 0 when filters / pageSize change
  const upd=(k,v)=>setF(x=>({...x,[k]:v}));
  const A=total?offset+1:0, B=Math.min(offset+rows.length,total), lastOff=Math.max(0,(Math.ceil(total/pageSize)-1)*pageSize);
  const canPrev=offset>0, canNext=offset+pageSize<total;
  async function saveLogging(){ try{ const r=await api('config',{method:'POST',body:JSON.stringify({logging:{enabled:lg.enabled,content:lg.content,retain:parseInt(lg.retain||50000,10)}})}); reload(r.state); toast('logging settings saved'); }catch(e){toast(e.message,true);} }
  async function clearCalls(){ if(!confirm('Delete ALL logged calls? This cannot be undone.'))return; try{ await api('calls/clear',{method:'POST'}); toast('call log cleared'); load(0); }catch(e){toast(e.message,true);} }
  // Export EVERY row (full prompt+reply content) by paging the id-cursor export endpoint, then download as JSON.
  async function exportAll(){
    if(exporting)return; setExporting(true); toast('exporting… paging full call log');
    try{ let after=0, all=[], guard=0;
      for(;;){ const d=await api('export?after='+after+'&limit=1000'); const rs=d.rows||[]; all.push(...rs);
        if(rs.length<1000)break; after=d.maxId; if(++guard>5000)break; }
      const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
      const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download='llm-hostbun-calls-full.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000);
      toast('exported '+all.length.toLocaleString()+' calls (full content)');
    }catch(e){ toast(e.message,true); } finally{ setExporting(false); }
  }
  return html`
  <${PageHead} title="Call log"/>
  <${Card}>
    <div class="row">
      <input placeholder="search model / ip / ua / prompt / reply…" style="flex:3" value=${f.q} onInput=${e=>upd('q',e.target.value)} onKeyDown=${e=>e.key==='Enter'&&load(0)}/>
      <input placeholder="exact model" style="flex:1" value=${f.model} onInput=${e=>upd('model',e.target.value)}/>
      <input placeholder="project" style="flex:1" value=${f.project} onInput=${e=>upd('project',e.target.value)} onKeyDown=${e=>e.key==='Enter'&&load(0)}/>
      <select style="flex:0 0 130px" value=${f.provider} onChange=${e=>upd('provider',e.target.value)}><option value="">any provider</option><option>local</option><option>crazyrouter</option><option>claudecode</option><option>blocked</option></select>
      <select style="flex:0 0 110px" value=${f.status} onChange=${e=>upd('status',e.target.value)}><option value="">any status</option><option value="ok">ok (&lt;400)</option><option value="error">error (≥400)</option></select>
      <button class="ghost sm" style="flex:0 0 auto" onClick=${()=>load(0)}>↻ Load</button>
    </div>
    <div class="flex" style="justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:10px">
      <small class="hint">${dbReady?html`showing <b>${A.toLocaleString()}–${B.toLocaleString()}</b> of <b>${total.toLocaleString()}</b> matching <span class="mut">· DB keeps the newest ${(state.logging&&state.logging.retain||50000).toLocaleString()} rows (older archived to NAS)</span>`:'call DB unavailable'}</small>
      <div class="flex" style="gap:6px;flex-wrap:wrap">
        <select value=${pageSize} onChange=${e=>setPageSize(+e.target.value)} style="width:auto" title="rows per page"><option value="100">100 / page</option><option value="200">200 / page</option><option value="500">500 / page</option></select>
        <button class="ghost sm" disabled=${!canPrev} onClick=${()=>load(0)}>« First</button>

function ProjectTable({s,sort,setSort,gotoCalls}){
  const rows=[...(s.byProject||[])]; const maxT=Math.max(1,...rows.map(r=>r.tok||0));
  const k=sort.key,d=sort.dir;
  rows.sort((a,b)=>{ let x,y;
    if(k==='project'){return d*String(a.project||'').localeCompare(String(b.project||''));}
    if(k==='io'){x=a.ptok||0;y=b.ptok||0;} else if(k==='errors'){x=a.n?a.errors/a.n:0;y=b.n?b.errors/b.n:0;} else {x=a[k]||0;y=b[k]||0;}
    return d*((x>y?1:x<y?-1:0));
  });
  const cols=[['project','project'],['n','calls'],['tok','tokens'],['io','in → out'],['usd','est $'],['avg_ms','avg'],['errors','err%'],[null,'providers'],['last','last seen'],[null,'share']];
  const onSort=key=>{ if(!key)return; setSort(sort.key===key?{key,dir:-sort.dir}:{key,dir:(key==='project'?1:-1)}); };
  return html`<table>
    <tr>${cols.map(([key,lbl])=>html`<th class=${key?'sortable '+(key===k?'on':''):''} onClick=${()=>onSort(key)}>${lbl}${key===k?(d<0?' ▾':' ▴'):''}</th>`)}</tr>
    ${rows.map(r=>{ const errPct=r.n>0?(r.errors/r.n*100):0; const share=r.tok/maxT*100;
      let badge=null; if(r.limit&&r.limitPct!=null){ const sp=r.limit.slowPct||95; const col=r.limitPct>=100?'var(--red)':r.limitPct>=sp?'var(--amb)':'#22c55e'; const cap=r.limit.tokens>0?nfmt(r.limit.tokens)+' tok':r.limit.calls>0?r.limit.calls+' calls':'';
        badge=html` <span class="chip" title=${r.limitPct+'% of '+cap+'/'+r.limit.window+' · at 100%: '+r.limit.hard} style="color:${col};border-color:${col}">${r.limitPct}% ${r.limit.hard==='block'?'🚫':r.limit.hard==='slow'?'🐢':'⚠'}</span>`; }
      return html`<tr class="click" onClick=${()=>gotoCalls({project:(r.project&&r.project!=='(none)')?r.project:''})}>
        <td class="mono" style="font-size:12px">${r.project||'(none)'}${badge}</td>
        <td class="mono">${r.n}</td><td class="mono">${(r.tok||0).toLocaleString()}</td>
        <td class="mono mut" style="font-size:12px">${nfmt(r.ptok)} → ${nfmt(r.ctok)}</td>
        <td class="mono">${usd(r.usd)}</td><td class="mono">${fmtMs(r.avg_ms)}</td>
        <td class="mono" style=${r.errors>0?'color:var(--red);font-weight:700':'color:var(--mut)'}>${errPct.toFixed(errPct&&errPct<10?1:0)}%</td>
        <td style="font-size:11px">${String(r.providers||'').split(',').join(' ')}</td>
        <td class="mono mut" style="font-size:11px">${ago(r.last)}</td>
        <td><span class="bar"><i style="width:${share.toFixed(1)}%;background:var(--acc)"></i></span></td>
      </tr>`; })}
  </table>`;
}

const BLOCK_VAL='__block__';
const valToRule=v=>{ if(!v)return null; if(v===BLOCK_VAL)return{block:true}; const [provider,...rest]=v.split('|'); return{provider,model:rest.join('|')}; };

function RuleSelect({cur,onChange}){
  const sel=ruleToVal(cur); const extra=(cur&&!cur.block&&!PROJ_MODELS.some(p=>p.provider===cur.provider&&p.model===cur.model));
  return html`<select value=${sel} onChange=${e=>onChange(valToRule(e.target.value))} style="flex:1">

function LimRow({name,l,isDef,onChg,onRm}){
  const g=(f,v)=>onChg({...l,[f]:v});
  const num=(f,w)=>html`<input type="number" min="0" style="width:${w}" value=${l[f]??0} onInput=${e=>g(f,+e.target.value||0)}/>`;
  return html`<tr>
    ${isDef?html`<td><b>★ default</b><div class="hint">all attributed projects</div></td>`:html`<td class="mono">${name}</td>`}
    <td><select value=${l.window||'24h'} onChange=${e=>g('window',e.target.value)}>${LIM_WINDOWS.map(w=>html`<option>${w}</option>`)}</select></td>
    <td>${num('tokens','100px')}</td><td>${num('calls','78px')}</td>
    <td><input type="number" min="0" max="100" style="width:50px" value=${l.warnPct??80} onInput=${e=>g('warnPct',+e.target.value||0)}/></td>
    <td><input type="number" min="0" max="100" style="width:50px" value=${l.slowPct??95} onInput=${e=>g('slowPct',+e.target.value||0)}/></td>
    <td>${num('slowMs','62px')}</td>
    <td><select value=${l.hard||'block'} onChange=${e=>g('hard',e.target.value)}>${LIM_HARD.map(([v,lb])=>html`<option value=${v}>${lb}</option>`)}</select></td>
    <td>${isDef?'':html`<button class="ghost" onClick=${onRm}>✕</button>`}</td>
  </tr>`;
}

/* ───────── MODELS & TEST ───────── */
/* The Claude catalog, and whether it is fiction.
   `advertised` is what /v1/models hands callers. `source:anthropic` means we reconciled it against
   api.anthropic.com; `seed` means that call has never succeeded and we are serving the hardcoded
   floor. Probing is separate and costs a max_tokens:1 ping per model — the catalog says what the
   org can SEE, the probe says what the subscription will actually SERVE, and they disagree. */
function ClaudeCatalog(){
  const {state}=useApp();
  const [cat,setCat]=useState(null); const [busy,setBusy]=useState(false);
  const [probe,setProbe]=useState(null); const [probing,setProbing]=useState(false);
  const accounts=(state.claudecodeAccountPool||[]).map(a=>a.name);
  const [acct,setAcct]=useState(accounts[0]||'');
  const load=useCallback(async()=>{ try{ setCat(await api('claudecode/models')); }catch(e){ toast(e.message,true); } },[]);
  useEffect(()=>{load();},[load]);
  async function refresh(){ setBusy(true); try{ setCat(await api('claudecode/models',{method:'POST'})); toast('catalog refreshed from Anthropic'); }catch(e){ toast(e.message,true); } finally{ setBusy(false); } }
  async function runProbe(){ if(!acct){toast('no accounts',true);return;} setProbing(true); setProbe(null);
    try{ const r=await api('claudecode/probe',{method:'POST',body:JSON.stringify({account:acct})}); setProbe(r);
      toast(`${r.usable.length}/${r.results.length} models usable on ${r.account}`, r.usable.length===0);
    }catch(e){ toast(e.message,true); } finally{ setProbing(false); } }
  const ago=ts=>{ if(!ts)return 'never'; const m=(Date.now()-ts)/60000; return m<1?'just now':m<60?Math.round(m)+'m ago':Math.round(m/60)+'h ago'; };
  const byId=new Map((probe?probe.results:[]).map(r=>[r.id,r]));
  return html`
  <${Card}>
    <h3>Claude catalog <small class="hint">— read from api.anthropic.com, not from config</small></h3>
    <div class="row" style="margin:8px 0">
      <div style="flex:1">
        <${KV} n="advertised on /v1/models">${cat?cat.advertised.length:'…'} ids<//>
      </div>
      <div style="flex:1">
        <${KV} n="source">${cat?html`<${Pill} cls=${cat.source==='anthropic'?'up':'warnp'}>${cat.source}<//>`:'…'}<//>
      </div>
      <div style="flex:1"><${KV} n="last checked">${cat?ago(cat.checkedAt):'…'} ${cat&&cat.sweptAccounts&&cat.sweptAccounts.length?html`<span class="hint">swept ${cat.sweptAccounts.length} account${cat.sweptAccounts.length===1?'':'s'}</span>`:''}<//></div>
    </div>
    ${cat&&cat.source!=='anthropic'&&html`<p class="down" style="margin:0 0 8px">Serving the hardcoded seed — Anthropic's catalog has not been read successfully${cat.error?': '+cat.error:''}. Ids still route; the list may just be stale.</p>`}
    ${cat&&cat.failedAccounts&&cat.failedAccounts.length>0&&html`<p class="warnp" style="margin:0 0 8px">Could not read the catalog on ${cat.failedAccounts.map(f=>f.account+' ('+f.error+')').join(', ')} — any model only those accounts can see is missing from this list.</p>`}
    <p class="hint" style="margin:0 0 8px">The catalog is <b>per-account</b>: this is the <b>union</b> across every account, so an id here may 404 on the account your project is pinned to. Probe to find out.</p>
    <div class="row">
      <button class="ghost sm" disabled=${busy} onClick=${refresh}>${busy?'refreshing…':'↻ Refresh from Anthropic'}</button>
      <span style="flex:1"></span>
      <select style="flex:0 0 auto" value=${acct} onChange=${e=>setAcct(e.target.value)}>${accounts.map(a=>html`<option value=${a}>${a}</option>`)}</select>
      <button class="ghost sm" disabled=${probing} onClick=${runProbe}>${probing?'probing…':'Probe which actually answer'}</button>
    </div>
    ${probe&&probe.usable.length===0&&html`<p class="down" style="margin:10px 0 0"><b>${probe.account} serves nothing.</b> Every advertised model returned an error — the subscription is exhausted, not the routing.</p>`}
    <div class="mono" style="max-height:340px;overflow:auto;margin-top:10px">
      ${cat?cat.advertised.map(id=>{ const p=byId.get(id); const m=(cat.models||[]).find(x=>x.id===id);
        const na=(m&&m.accounts)?m.accounts.length:0, tot=(cat.sweptAccounts||[]).length;
        return html`<div class="flex" key=${id} style="gap:8px;padding:3px 0;align-items:center">
          <span style="flex:0 0 auto">${p?html`<${Pill} cls=${p.ok?'up':'down'}>${p.ok?'200':(p.status||'ERR')}<//>`:html`<span class="pill mut" style="opacity:.45">·</span>`}</span>
          <span>${id}</span>
          <span class="mut">${m&&m.display_name?'· '+m.display_name:''}</span>
          ${m&&tot>0&&na<tot?html`<span class="pill warnp" title=${'only on: '+m.accounts.join(', ')}>${na}/${tot} accts</span>`:''}
          ${!m&&cat.source==='anthropic'?html`<span class="pill mut" title="in the code seed, not in Anthropic's catalog">seed only</span>`:''}
          ${p&&!p.ok&&p.error?html`<span class="mut hint">${p.error}</span>`:''}
        </div>`; }):html`<span class="mut">loading…</span>`}
    </div>
    ${probe&&html`<p class="hint" style="margin:8px 0 0">Probed ${probe.account} · ${probe.usable.length}/${probe.results.length} usable. A <code>429</code> here is Anthropic refusing the model on that subscription — no amount of routing config fixes it.</p>`}
  </${Card}>`;
}

function Models(){
  const [models,setModels]=useState(null);
  const [filter,setFilter]=useState('');
  const [tm,setTm]=useState(''); const [tp,setTp]=useState('In one short sentence, what model are you?');
  const [out,setOut]=useState(null);
  useEffect(()=>{ (async()=>{ try{ setModels(await api('models')); }catch(e){} })(); },[]);
  async function runTest(){ const model=tm.trim(); if(!model){toast('enter a model',true);return;} setOut('running…');
    try{ const r=await api('test',{method:'POST',body:JSON.stringify({model,prompt:tp})}); setOut(`provider=${r.provider} sent=${r.sentModel} status=${r.status} ${r.ms}ms\n`+(r.content!=null?('\n'+r.content):('\n[no content]\n'+(r.error||r.raw||'')))); }
    catch(e){ setOut('error: '+e.message); } }
  const all=models?[...models.local,...models.claudecode,...models.crazyrouter]:[];
  const sec=(title,cls,arr)=>{ const items=(arr||[]).filter(m=>!filter||m.id.toLowerCase().includes(filter.toLowerCase())); if(!items.length)return '';
    return html`<div style="margin:10px 0 4px"><${Pill} cls=${cls}>${title}<//> <span class="mut">${items.length}</span></div>${items.map(m=>html`<div style="padding:3px 0">${m.id} <span class="mut">· ${m.owned_by||''}</span></div>`)}`; };
  return html`
  <${PageHead} title="Models & test"/>
  <${ClaudeCatalog}/>
  <${Card}>
    <h3>Test a model <small class="hint">— runs a real chat completion through current routing</small></h3>
    <div class="row">
      <input list="modellist" style="flex:2" placeholder="model e.g. local / claude-sonnet-4-6 / gemini-2.5-pro" value=${tm} onInput=${e=>setTm(e.target.value)}/>
      <button style="flex:0 0 auto" onClick=${runTest}>Run</button>
    </div>
    <datalist id="modellist">${all.map(m=>html`<option value=${m.id}></option>`)}</datalist>
    <input placeholder="prompt" value=${tp} onInput=${e=>setTp(e.target.value)} style="margin-top:8px"/>
    ${out!=null&&html`<pre>${out}</pre>`}
  </${Card}>
  <${Card}>
    <h3>Available models ${models?html`<span class="mut">(local ${models.local.length} · claudecode ${models.claudecode.length} · crazyrouter ${models.crazyrouter.length})</span>`:''}</h3>
    <input placeholder="filter…" value=${filter} onInput=${e=>setFilter(e.target.value)} style="margin-bottom:8px"/>
    <div class="mono" style="max-height:420px;overflow:auto">${models?html`${sec('local','local',models.local)}${sec('claudecode','claudecode',models.claudecode)}${sec('crazyrouter','crazyrouter',models.crazyrouter)}`:html`<span class="mut">loading…</span>`}</div>
  </${Card}>`;
}

/* ───────── CRAZYROUTER ───────── */
function Crazyrouter(){
  const {reload}=useApp();
  const [c,setC]=useState(null); const [nk,setNk]=useState(''); const [test,setTest]=useState(null);
  const load=useCallback(async()=>{ setC('loading'); try{ setC(await api('crazyrouter')); }catch(e){ setC(null); } },[]);
  useEffect(()=>{load();},[load]);
  async function testKey(){ const key=nk.trim(); if(!key){toast('paste a key',true);return;} setTest('testing…');
    try{ const r=await api('crazyrouter/test',{method:'POST',body:JSON.stringify({key})}); setTest(JSON.stringify(r,null,2)); toast(r.keyValid?'key is VALID — click Save key':'key is INVALID',!r.keyValid); }catch(e){ setTest('error: '+e.message); } }
  async function saveKey(){ const key=nk.trim(); if(!key){toast('paste a key',true);return;} try{ const r=await api('config',{method:'POST',body:JSON.stringify({crazyrouterKey:key})}); reload(r.state); setNk(''); toast('key saved (live)'); load(); }catch(e){toast(e.message,true);} }
  return html`
  <${PageHead} title="Crazyrouter (cloud provider)" onRefresh=${load}/>
  <${Card}>
    ${c==='loading'||c==null?html`<div class="mut">${c==null?'unavailable':'checking…'}</div>`:html`
    <div class="grid">
      <${KV} n="Key">${c.keySet?(c.keyValid?html`<span class="up">valid</span>`:html`<span class="down">INVALID</span>`):html`<span class="down">not set</span>`}<//>
      <${KV} n="Limit">${c.hardLimitUsd!=null?'$'+c.hardLimitUsd:'—'}<//>
      <${KV} n="Used">${c.totalUsageUsd!=null?'$'+c.totalUsageUsd.toFixed(2):'—'}<//>
      <${KV} n="Remaining">${c.remainingUsd!=null?'$'+c.remainingUsd.toFixed(2):'—'}<//>
      <${KV} n="Models">${c.modelCount??'—'}<//>
      <${KV} n="Key id">${c.keyMasked||'(none)'}<//>
    </div>
    ${(c.message||!c.keyValid)&&html`<p class="warn" style="margin-top:12px">${(c.message||'key check failed')+(c.statuses?' · statuses '+JSON.stringify(c.statuses):'')}</p>`}`}
  </${Card}>
  <${Card}>
    <h3>Update key <small class="hint">— paste a new <code>sk-</code> key; test it before saving</small></h3>
    <input placeholder="sk-…" value=${nk} onInput=${e=>setNk(e.target.value)}/>
    <div class="flex" style="margin-top:10px"><button class="ghost" onClick=${testKey}>Test key</button><button onClick=${saveKey}>Save key (live, no redeploy)</button></div>
    ${test!=null&&html`<pre>${test}</pre>`}
  </${Card}>`;
}

function Secrets(){
  const {state,reload}=useApp();

  async function setSecret(field,val){ if(!val){toast('enter a value',true);return;} try{ const r=await api('config',{method:'POST',body:JSON.stringify({[field]:val})}); reload(r.state); toast(field+' updated'); }catch(e){toast(e.message,true);} }
  async function disableGate(){ if(!confirm('Disable the gate? Gated models become open to anyone.'))return; try{ const r=await api('config',{method:'POST',body:JSON.stringify({oblitToken:''})}); reload(r.state); toast('gate disabled'); }catch(e){toast(e.message,true);} }
  async function changePw(){ if(v.admin.length<3){toast('min 3 chars',true);return;} if(!confirm('Change admin password? You may need to sign in again.'))return; try{ await api('config',{method:'POST',body:JSON.stringify({adminPassword:v.admin})}); setV({...v,admin:''}); toast('password changed — re-login if prompted'); }catch(e){toast(e.message,true);} }
  return html`
  <${PageHead} title="Secrets & gate"/>
  <div class="warn">Live, file-backed overrides (<code>${state.configFile}</code>). Leaving a field blank keeps the current value.</div>
  <${Card}>
    <h3>claudecode account tokens <span class="mut">(${(state.claudecodeAccountPool||[]).length} in pool)</span></h3>
    <small class="hint">Max account tokens live in <code>claudecodeAccountPool</code> inside the config file above — the only
    copy anywhere. They are never returned to this UI. Edit them on the volume, and back it up before touching the app.</small>
  </${Card}>
  <${Card}>
    <h3>Obliterated / uncensored gate <span class="mut">(token: ${state.oblitTokenSet?state.oblitTokenMasked:'(open — no gate)'})</span></h3>
    <p class="mut" style="font-size:13px;margin:0 0 8px">When set, requests to a gated model require <code>Authorization: Bearer &lt;token&gt;</code>. Empty = open.</p>
    <div class="flex"><input type="password" placeholder="new gate token" value=${v.oblit} onInput=${e=>setV({...v,oblit:e.target.value})}/><button class="sm" style="flex:0 0 auto" onClick=${()=>{setSecret('oblitToken',v.oblit);setV({...v,oblit:''});}}>Update</button><button class="danger sm" style="flex:0 0 auto" onClick=${disableGate}>Disable gate</button></div>
    <small class="hint">Gated upstream model ids are edited on the Routing page (Advanced → JSON enforcement).</small>
  </${Card}>
  <${Card}>
    <h3>Admin password <span class="mut">(current: ${state.adminPasswordMasked})</span></h3>
    <div class="flex"><input type="password" placeholder="new admin password (≥3 chars)" value=${v.admin} onInput=${e=>setV({...v,admin:e.target.value})}/><button class="sm danger" style="flex:0 0 auto" onClick=${changePw}>Change</button></div>
    <small class="hint">changing this signs you out of other sessions.</small>
  </${Card}>`;
}

/* ───────── shared page header ───────── */
const PageHead = ({title,onRefresh}) => html`<div class="flex" style="justify-content:space-between;margin-bottom:6px"><h2>${title}</h2>${onRefresh&&html`<button class="ghost sm" onClick=${onRefresh}>↻ Refresh</button>`}</div>`;

/* ───────── call drawer ───────── */
function CallDrawer({id,onClose}){
  const [c,setC]=useState(null);
  useEffect(()=>{ if(id==null){setC(null);return;} setC('loading');
    (async()=>{ try{ setC(await api('call?id='+id)); }catch(e){ setC({error:e.message}); } })();
  },[id]);
  useEffect(()=>{ const h=e=>{ if(e.key==='Escape')onClose(); }; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); },[onClose]);
  const open=id!=null;
  const copy=()=>{ if(c&&typeof c==='object'&&!c.error) navigator.clipboard.writeText(JSON.stringify(c,null,2)).then(()=>toast('copied call JSON')); };
  return html`
  <div class=${'dov'+(open?' open':'')} onClick=${onClose}></div>
  <aside class=${'drawer'+(open?' open':'')} aria-hidden=${!open}>
    <div class="drawer-hd">
      <div style="font-weight:600">${c&&c.id?html`Call #${c.id} <${StatusPill} status=${c.status} error=${c.error}/> <${ProviderPill} provider=${c.provider}/>`:'Call'}</div>
      <span style="flex:1"></span>
      <button class="ghost sm" onClick=${copy}>Copy JSON</button>
      <button class="ghost sm" onClick=${onClose}>✕</button>
    </div>
    <div class="drawer-bd">
      ${c==null||c==='loading'?html`<span class="mut">${c==='loading'?'loading…':''}</span>`
      : c.error?html`<span class="down">error: ${c.error}</span>`
      : html`
      <div class="dsec"><div class="dmeta">
        <${KV} n="when">${fmtTime(c.ts)}<//>
        <${KV} n="project">${c.project||'(none)'}<//>
        <${KV} n="model">${c.req_model||'-'}${c.sent_model&&c.sent_model!==c.req_model?html` <span class="mut">→ ${c.sent_model}</span>`:''}<//>
        <${KV} n="key">${c.key_label||'—'}<//>
        <${KV} n="latency">${fmtMs(c.duration_ms)}<//>
        <${KV} n="stream">${c.stream?'yes':'no'}<//>
        <${KV} n="tokens">${c.prompt_tokens??'?'} → ${c.completion_tokens??'?'} <span class="mut">(${c.total_tokens??'?'})</span><//>
        <${KV} n="effort">${c.effort?html`<span style="color:var(--amb)">🧠 ${c.effort}</span>`:'—'}<//>
        <${KV} n="thinking">${c.thinking_tokens==null?'—':c.thinking_tokens===0?'off':html`<span style="color:var(--acc)">💭 ${nfmt(c.thinking_tokens)} tok</span>`}<//>
        <${KV} n="max tokens">${c.max_tokens?nfmt(c.max_tokens):'—'}<//>
        <${KV} n="temperature">${c.temperature==null?'—':c.temperature}<//>
        <${KV} n="ip">${c.ip||'—'}<//>
      </div></div>
      ${c.error&&html`<div class="dsec"><div class="dlbl" style="color:var(--red)">error</div><div class="msgbox" style="color:var(--red)">${c.error}</div></div>`}
      <div class="dsec"><div class="dlbl">prompt</div><div class="msgbox">${c.req_content||'(not stored)'}</div></div>
      <div class="dsec"><div class="dlbl">reply</div><div class="msgbox">${c.resp_content||'(not stored)'}</div></div>
      ${c.ua&&html`<div class="dsec"><div class="dlbl">client · user-agent</div><div class="msgbox" style="max-height:none">${c.ua}</div></div>`}
      `}
    </div>
  </aside>`;
}

/* ───────── shell ───────── */
/* ───────── Accounts: live per-account 5h/7d limits, harvested free off real traffic ───────── */
/* Project pins. One project → one account, forever; no header can override it. Rotating accounts
   blows the per-org prompt cache and makes "who spent this?" unanswerable. An unpinned project
   403s rather than billing a guess, so this table is the ONLY way a new app gets served. */
function Pins(){
  const {state,reload}=useApp();
  const pins=state.projectAccounts||state.consumerAccounts||{};
  const accounts=(state.claudecodeAccountPool||[]).map(a=>a.name);
  const [np,setNp]=useState(''); const [na,setNa]=useState(accounts[0]||''); const [busy,setBusy]=useState('');
  // Single-pin merge server-side. Never POST the whole projectAccounts map from here: `config`
  // assigns it wholesale, so one stale render would delete every other project's pin.
  async function setPin(project,account){
    setBusy(project);
    try{ await api('pins',{method:'POST',body:JSON.stringify({project,account})});
      toast(account?`${project} → ${account}`:`${project} unpinned`); reload();
    }catch(e){ toast(e.message,true); } finally{ setBusy(''); }
  }
  async function add(){ const p=np.trim().toLowerCase(); if(!p){toast('project slug required',true);return;} if(!na){toast('pick an account',true);return;} await setPin(p,na); setNp(''); }
  const names=Object.keys(pins).sort();
  return html`
  <${Card}>
    <h3>Project pins <small class="hint">— which subscription each app spends</small></h3>
    <p class="hint" style="margin:4px 0 12px">An <b>unpinned</b> project gets <code>403 no_account_for_project</code>. That is deliberate: the gateway never guesses whose Max plan to bill. ${state.defaultAccount?html`<b class="down">defaultAccount is set to "${state.defaultAccount}" — every unpinned or misspelled project silently bills it instead of 403'ing.</b>`:html`<code>defaultAccount</code> is empty, which is what keeps the 403 honest.`}</p>
    <div style="overflow:auto"><table>
      <tr><th>project</th><th>account</th><th></th></tr>
      ${names.length?names.map(p=>html`<tr key=${p}>
        <td class="mono"><b>${p}</b></td>
        <td><select disabled=${busy===p} value=${pins[p]} onChange=${e=>setPin(p,e.target.value)}>
          ${accounts.map(a=>html`<option value=${a} selected=${a===pins[p]}>${a}</option>`)}
        </select></td>
        <td><button class="ghost sm" disabled=${busy===p} onClick=${()=>setPin(p,null)}>Unpin</button></td>
      </tr>`):html`<tr><td colspan="3" class="hint">No pins — every claudecode call is 403'ing.</td></tr>`}
    </table></div>
    <div class="row" style="margin-top:12px">
      <input style="flex:2" placeholder="new project slug, e.g. promopilot" value=${np} onInput=${e=>setNp(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&add()}/>
      <select style="flex:1" value=${na} onChange=${e=>setNa(e.target.value)}>${accounts.map(a=>html`<option value=${a}>${a}</option>`)}</select>
      <button style="flex:0 0 auto" disabled=${!!busy} onClick=${add}>Pin</button>
    </div>
  </${Card}>`;
}

function Accounts(){
  const {go}=useApp();
  const [rows,setRows]=useState([]); const [now,setNow]=useState(Date.now()); const [err,setErr]=useState('');
  const load=useCallback(async()=>{ try{ const d=await api('limits'); setRows(d.rows||[]); setNow(d.now||Date.now()); setErr(''); }catch(e){ setErr(e.message||'load failed'); } },[]);
  useEffect(()=>{ load(); const t=setInterval(load,15000); return ()=>clearInterval(t); },[load]);
  const pct=v=>v==null?'—':Math.round(v*100)+'%';
  const cls=v=>v==null?'':v>=0.9?'down':v>=0.7?'warnp':'up';
  const rel=ts=>{ if(!ts)return '—'; const ms=ts*1000-now; if(ms<=0)return 'now'; const h=ms/3600000; return h>=1?Math.round(h)+'h':Math.max(1,Math.round(ms/60000))+'m'; };
  const ago=ts=>{ if(!ts)return ''; const m=(now-ts)/60000; return m<1?'just now':m<60?Math.round(m)+'m ago':Math.round(m/60)+'h ago'; };
  return html`
  <${PageHead} title="Accounts, pins & limits" onRefresh=${load}/>
  <${Pins}/>
  <div class="card">
    <p class="hint" style="margin:0 0 12px">Per-account Anthropic <b>5h</b> / <b>7d</b> headroom, harvested for free off the rate-limit headers of real <span class="pill claudecode">anthropic</span>-provider traffic — <b>zero probe tokens</b>. Keyed by organization id; refreshes every 15s and on each call.</p>
    <p class="hint" style="margin:-6px 0 12px"><b class="warnp">Read these as a floor, not a verdict.</b> A <code>429</code> response carries <i>no</i> <code>anthropic-ratelimit-*</code> headers, so an exhausted account teaches this table nothing and keeps whatever it last reported — often <code>0% · allowed</code>, harvested from a cheap model that still answers. For ground truth, probe the models on <a href=${'/models'} onClick=${e=>{e.preventDefault();go('models');}}>Models</a>.</p>
    ${err?html`<p class="down">${err}</p>`:''}
    <div style="overflow:auto"><table>
      <tr><th>project</th><th>org</th><th>5h</th><th>7d</th><th>status</th><th>7d resets in</th><th>model</th><th>last seen</th></tr>
      ${rows.length? rows.map(r=>html`<tr>
        <td class="mono"><b>${r.project||'—'}</b></td>
        <td class="mono hint" title=${r.org_id}>${(r.org_id||'').slice(0,8)}</td>
        <td><span class="pill ${cls(r.u5)}">${pct(r.u5)}</span></td>
        <td><span class="pill ${cls(r.u7)}">${pct(r.u7)}</span></td>
        <td>${(r.s7==='allowed_warning')?html`<span class="warnp">warning</span>`:(r.status||'—')}</td>
        <td class="mono">${rel(r.reset7)}</td>
        <td class="mono hint">${r.model||''}</td>
        <td class="hint">${ago(r.ts)}</td>
      </tr>`): html`<tr><td colspan="8" class="hint">No anthropic-provider traffic yet — a row appears on the first real call routed to a local-dev project.</td></tr>`}
    </table></div>
  </div>`;
}
function Conversations(){
  const [rows,setRows]=useState([]); const [now,setNow]=useState(Date.now()); const [err,setErr]=useState('');
  const load=useCallback(async()=>{ try{ const d=await api('conversations?limit=80'); setRows(d.conversations||[]); setNow(Date.now()); setErr(''); }catch(e){ setErr(e.message||'load failed'); } },[]);
  useEffect(()=>{ load(); const t=setInterval(load,20000); return ()=>clearInterval(t); },[load]);
  const ago=ts=>{ if(!ts)return ''; const m=(now-ts)/60000; return m<1?'now':m<60?Math.round(m)+'m':Math.round(m/60)+'h'; };
  const maxTax=Math.max(1,...rows.map(r=>r.tools_kb||0));
  const bar=(v,max,color)=>html`<div style="display:inline-block;vertical-align:middle;background:#2a2a30;border-radius:3px;height:6px;width:54px;overflow:hidden;margin-right:6px"><div style="height:100%;width:${Math.round(100*Math.min(v||0,max)/max)}%;background:${color}"></div></div>`;
  const hit=r=>{ const cr=r.cache_read||0, fi=Math.max(0,r.fresh_in||0); const tot=cr+fi; return tot?Math.round(100*cr/tot):0; };
  return html`
  <${PageHead} title="Conversations — per-chat MCP tools, cache & cost" onRefresh=${load}/>
  <div class="card">
    <p class="hint" style="margin:0 0 12px">Each Claude Code session: how many <b>MCP tools</b> it loads, the <b>tool-schema tax</b> (context KB carried every turn), <b>cache hit</b> (green = warm/cheap), <b>cache-write</b> tokens (new content cached each turn; a big spike = a full rebuild after >5-min idle), <b>fresh</b> input (real new tokens, not cached), and total spend.</p>
    ${err?html`<p class="down">${err}</p>`:''}
    <div style="overflow:auto"><table>
      <tr><th>session</th><th>box</th><th>account</th><th>msgs</th><th>MCP/tools</th><th>tool tax</th><th>cache hit</th><th>cache-wr</th><th>fresh</th><th>tokens</th><th>err</th><th>seen</th></tr>
      ${rows.length? rows.map(r=>html`<tr>
        <td class="mono hint" title=${r.session}>${(r.session||'').slice(0,8)}</td>
        <td class="mono">${(r.consumer||'').replace('-claude','')}</td>
        <td><span class="pill">${(r.account||'—').replace('anthropic:','')}</span></td>
        <td class="mono">${r.msgs||0}</td>
        <td class="mono" title="${r.mcp_tools||0} MCP of ${r.tools||0} total tools">${r.mcp_tools||0}<span class="hint">/${r.tools||0}</span></td>
        <td>${bar(r.tools_kb,maxTax,'#f59e0b')}<span class="hint mono">${r.tools_kb||0}KB</span></td>
        <td><span class="pill ${hit(r)>=90?'up':hit(r)>=50?'warnp':'down'}">${hit(r)}%</span></td>
        <td class="mono hint" title="cache-creation tokens: mostly incremental (new content each turn); big spikes = full rebuild after idle">${nfmt(r.cache_write)||0}</td>
        <td class="mono" title="fresh input tokens (not cached)">${nfmt(r.fresh_in)||0}</td>
        <td class="mono">${nfmt(r.tokens)||0}</td>
        <td class="mono ${r.errors>0?'down':'hint'}">${r.errors||0}</td>
        <td class="hint">${ago(r.last_ts)}</td>
      </tr>`): html`<tr><td colspan="12" class="hint">No conversations yet — a row appears once an anthropic-provider session logs a call.</td></tr>`}
    </table></div>
  </div>`;
}
const PAGES={overview:Overview,calls:Calls,convos:Conversations,stats:Stats,accounts:Accounts,routing:Routing,models:Models,crazyrouter:Crazyrouter,secrets:Secrets};
function Shell({slug,go,children}){
  const [sbOpen,setSbOpen]=useState(false);
  return html`<div class="shell">
    <aside class=${'sidebar'+(sbOpen?' open':'')}>
      <div class="sb-brand"><div class="logo">hb</div><div><div class="t">hostbun</div><div class="s">llm router · control panel</div></div></div>
      <nav class="nav">
        ${NAV.map(it=>it.sec?html`<div class="nav-sec">${it.sec}</div>`:html`
          <a class=${'nav-item'+(it.slug===slug?' on':'')} href=${BASE+'/'+it.slug} onClick=${e=>{e.preventDefault();go(it.slug);setSbOpen(false);}}>
            <${Svg} n=${it.icon}/><span>${it.name}</span>
          </a>`)}
      </nav>
      <div class="sb-foot"><button class="ghost sm" style="width:100%" onClick=${async()=>{ try{await api('logout',{method:'POST'});}catch{} location.reload(); }}>Sign out</button></div>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="ghost sm hamb" onClick=${()=>setSbOpen(!sbOpen)}>☰</button>
        <span class="crumb">hostbun <span style="opacity:.5">/</span></span><h2 style="font-size:16px">${nameFor(slug)}</h2>
      </header>
      <div class="content">${children}</div>
    </div>
  </div>`;
}

/* ───────── login ───────── */
function Login({onOk}){
  const [pw,setPw]=useState(''); const [err,setErr]=useState('');
  async function submit(){ setErr(''); try{ await api('login',{method:'POST',body:JSON.stringify({password:pw})}); onOk(); }catch(e){ setErr(e.message); } }
  return html`<div class="login">
    <div class="sb-brand" style="justify-content:center;border:0;margin:0 0 8px;padding:0"><div class="logo">hb</div></div>
    <h1 style="font-size:20px">llm.hostbun.cc</h1>
    <p class="mut">control panel</p>
    <div class="card">
      <input type="password" placeholder="password" autofocus value=${pw} onInput=${e=>setPw(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&submit()}/>
      <div style="height:10px"></div>
      <button style="width:100%" onClick=${submit}>Sign in</button>
      ${err&&html`<p class="down" style="margin:10px 0 0;font-size:13px">${err}</p>`}
    </div>
  </div>`;
}

/* ───────── root ───────── */
function App(){
  const [authed,setAuthed]=useState(null); // null=checking
  const [state,setState]=useState(null);
  const [slug,setSlug]=useState(()=>{ let s=location.pathname.replace(BASE,'').replace(/^\/+/,'').split('/')[0]||'overview'; return NAV.some(x=>x.slug===s)?s:'overview'; });
  const [callId,setCallId]=useState(null);
  const boot=useCallback(async()=>{ try{ const s=await api('state'); setState(s); setAuthed(true); }catch(e){ setAuthed(false); } },[]);
  useEffect(()=>{ onUnauth=()=>setAuthed(false); boot(); },[boot]);
  useEffect(()=>{ const h=()=>{ let s=location.pathname.replace(BASE,'').replace(/^\/+/,'').split('/')[0]||'overview'; setSlug(NAV.some(x=>x.slug===s)?s:'overview'); }; window.addEventListener('popstate',h); return ()=>window.removeEventListener('popstate',h); },[]);
  const go=useCallback(s=>{ history.pushState({},'',BASE+'/'+s); setSlug(s); document.title='hostbun · '+nameFor(s); },[]);
  useEffect(()=>{ document.title='hostbun · '+nameFor(slug); },[slug]);
  const reload=useCallback(s=>{ if(s)setState(s); else boot(); },[boot]);

  if(authed===null) return html`<div class="mut" style="padding:40px;text-align:center">…</div>`;
  if(!authed) return html`<${Login} onOk=${boot}/>`;
  if(!state) return html`<div class="mut" style="padding:40px;text-align:center">loading…</div>`;
  const Page=PAGES[slug]||Overview;
  // gotoCalls: drill into the call log with a filter (project= or q=). Calls remounts on nav and reads these.
  const gotoCalls=(params)=>{ try{ const u=new URL(location.href); u.searchParams.delete('project'); u.searchParams.delete('q'); Object.entries(params||{}).forEach(([k,v])=>{ if(v) u.searchParams.set(k,v); }); history.replaceState({},'',u); }catch{} go('calls'); };
  const ctx={ state, reload, go, openCall:setCallId, gotoCalls };
  return html`<${Ctx.Provider} value=${ctx}>
    <${Shell} slug=${slug} go=${go}><${Page}/></${Shell}>
    <${CallDrawer} id=${callId} onClose=${()=>setCallId(null)}/>
  </${Ctx.Provider}>`;
}
render(html`<${App}/>`, document.getElementById('root'));
</script>
