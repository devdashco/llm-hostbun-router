<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>llm.hostbun.cc ŌĆö admin</title>
<style>
:root{
  --bg:#09090b;--card:#0c0c0f;--card2:#141417;--bd:#26262b;--fg:#fafafa;--mut:#a1a1aa;
  --acc:#3b82f6;--grn:#22c55e;--red:#ef4444;--amb:#f59e0b;--clr:#f97316;
  --ring:rgba(59,130,246,.35);--pri:#fafafa;--prifg:#18181b;--hover:#18181b;
}
*{box-sizing:border-box}
html,body{background:var(--bg)}
body{margin:0;color:var(--fg);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}
.hide{display:none!important}
.mut{color:var(--mut)} .mono{font:13px ui-monospace,Menlo,monospace}
h1{font-size:24px;margin:0} h2{font-size:16px;font-weight:600;margin:0 0 4px}
h3{margin:0 0 8px;font-size:15px;font-weight:600}
small.hint{color:var(--mut);font-size:12px;font-weight:400}
code{background:#1c1c20;border:1px solid var(--bd);border-radius:5px;padding:1px 6px;font:13px ui-monospace,Menlo,monospace}
/* ŌöĆŌöĆ layout ŌöĆŌöĆ */
.shell{display:grid;grid-template-columns:252px minmax(0,1fr);min-height:100vh}
.sidebar{position:sticky;top:0;align-self:start;height:100vh;background:var(--card);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:14px 12px;overflow-y:auto}
.sb-brand{display:flex;align-items:center;gap:10px;padding:6px 6px 14px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.sb-brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--acc),#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;flex:0 0 auto}
.sb-brand .t{font-weight:600;font-size:14px;line-height:1.15}
.sb-brand .s{font-size:11px;color:var(--mut)}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);padding:14px 10px 5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--mut);cursor:pointer;font-size:13.5px;font-weight:500;border:1px solid transparent}
.nav-item:hover{background:var(--hover);color:var(--fg);text-decoration:none}
.nav-item.on{background:#1c1c20;color:var(--fg);border-color:var(--bd)}
.nav-item svg{width:17px;height:17px;flex:0 0 auto}
.nav-item .badge{margin-left:auto;font:11px ui-monospace,monospace;padding:1px 7px;border-radius:8px;border:1px solid var(--bd);color:var(--mut)}
.sb-foot{border-top:1px solid var(--bd);padding-top:10px;margin-top:6px}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;padding:12px 22px}
.topbar h2{margin:0}
.topbar .crumb{color:var(--mut);font-size:13px}
.content{padding:22px 22px 90px;max-width:1180px;width:100%}
.hamb{display:none}
@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;z-index:50;width:252px;transform:translateX(-101%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.5)}
  .sidebar.open{transform:none}
  .hamb{display:inline-flex}
  .content{padding:18px 14px 80px}
}
/* ŌöĆŌöĆ primitives ŌöĆŌöĆ */
.card{background:var(--card2);border:1px solid var(--bd);border-radius:14px;padding:18px;margin:14px 0}
.card.acc{border-color:var(--acc)} .card.amb{border-color:var(--amb)}
input,select,textarea{background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--fg);padding:8px 10px;font:14px ui-monospace,Menlo,monospace;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--ring)}
label{display:block;font-size:13px;color:var(--mut);margin:10px 0 4px}
button{background:var(--pri);color:var(--prifg);border:0;border-radius:8px;padding:8px 14px;font:600 13px -apple-system,sans-serif;cursor:pointer}
button:hover{background:#e4e4e7}
button.ghost{background:transparent;color:var(--fg);border:1px solid var(--bd)}
button.ghost:hover{background:var(--hover)}
button.danger{background:transparent;color:var(--red);border:1px solid #7f1d1d}
button.danger:hover{background:#2a1112}
button.sm{padding:6px 10px;font-size:12px}
table{border-collapse:collapse;width:100%;margin:8px 0}
th,td{border:0;border-bottom:1px solid var(--bd);padding:9px 10px;text-align:left;vertical-align:middle;font-size:14px}
th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.03em;font-weight:600;cursor:default}
th.sortable{cursor:pointer} th.sortable.on{color:var(--acc)}
tr.click{cursor:pointer} tr.click:hover td{background:#1a212b}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.flex{display:flex;gap:8px;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.kv{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px}
.kv .n{font-size:12px;color:var(--mut)} .kv .v{font:600 19px ui-monospace,monospace;margin-top:3px}
.pill{display:inline-block;font:12px ui-monospace,monospace;padding:2px 9px;border-radius:8px;border:1px solid var(--bd);font-weight:600}
.up{color:var(--grn);border-color:var(--grn)} .down{color:var(--red);border-color:var(--red)} .warnp{color:var(--amb);border-color:var(--amb)}
.crazyrouter,.cloud{color:var(--acc);border-color:var(--acc)} .local{color:var(--grn);border-color:var(--grn)} .wrappy,.claude{color:var(--clr);border-color:var(--clr)} .blocked{color:var(--red);border-color:var(--red)}
.chip{font:11px ui-monospace,monospace;padding:1px 6px;border-radius:10px;border:1px solid var(--bd);color:var(--mut)}
.seg{display:inline-flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.seg button{background:transparent;color:var(--mut);border:0;border-radius:0;padding:5px 11px;font:600 12px -apple-system,sans-serif}
.seg button.on{background:var(--acc);color:#04101f}
.wintabs{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 14px}
.wintabs button{background:#1c1c20;color:var(--mut);border:1px solid var(--bd)}
.wintabs button.on{background:var(--acc);color:#04101f;border-color:var(--acc)}
.bar{height:9px;border-radius:5px;background:#26262b;overflow:hidden;display:flex}
.bar>i{display:block;height:100%}
.lblrow{display:flex;align-items:center;gap:10px;margin:8px 0}
.lblrow .nm{flex:0 0 150px;font:13px ui-monospace,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lblrow .bar{flex:1}
.lblrow .vv{flex:0 0 auto;font:12px ui-monospace,monospace;color:var(--mut);min-width:170px;text-align:right}
.swatch{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
pre{background:#0b0b0e;border:1px solid var(--bd);border-radius:10px;padding:12px;overflow:auto;font:13px ui-monospace,monospace;white-space:pre-wrap;word-break:break-word;max-height:340px;margin:8px 0}
.warn{background:#241a06;border:1px solid #7c5306;border-radius:10px;padding:10px 14px;font-size:13px}
.banner{border-radius:12px;padding:12px 16px;margin:0 0 14px}
.banner.ok{border:1px solid var(--grn);background:#0f1f14}
.banner.bad{border:1px solid var(--amb);background:#1f1a0e}
.x{color:var(--red);cursor:pointer;font-weight:700;padding:0 6px}
details.adv>summary{cursor:pointer;color:var(--mut);font-size:14px;padding:8px 0;user-select:none;list-style:none}
details.adv>summary::-webkit-details-marker{display:none}
details.adv>summary::before{content:'Ō¢Ė ';color:var(--acc)}
details.adv[open]>summary::before{content:'Ō¢Š '}
details.adv>summary:hover{color:var(--fg)}
/* ŌöĆŌöĆ login ŌöĆŌöĆ */
.login{max-width:360px;margin:12vh auto 0;text-align:center}
.login .card{padding:22px}
/* ŌöĆŌöĆ toast ŌöĆŌöĆ */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--bd);border-radius:10px;padding:11px 18px;opacity:0;transition:opacity .2s;z-index:99;max-width:90vw;pointer-events:none}
#toast.show{opacity:1}
/* ŌöĆŌöĆ drawer ŌöĆŌöĆ */
.dov{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.dov.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(720px,96vw);background:var(--card);border-left:1px solid var(--bd);transform:translateX(101%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:61;display:flex;flex-direction:column;box-shadow:-18px 0 54px rgba(0,0,0,.5)}
.drawer.open{transform:none}
.drawer-hd{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--bd)}
.drawer-bd{padding:16px 18px;overflow-y:auto;flex:1}
.dsec{margin:0 0 16px}
.dlbl{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--mut);font-weight:600;margin:0 0 6px}
.dmeta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.dmeta .kv{padding:9px 11px} .dmeta .kv .n{font-size:10.5px} .dmeta .kv .v{font-size:14px;margin-top:2px}
.msgbox{background:#0b0b0e;border:1px solid var(--bd);border-radius:10px;padding:12px;font:13px ui-monospace,Menlo,monospace;white-space:pre-wrap;word-break:break-word;max-height:42vh;overflow:auto}
</style></head>
<body>
<div id="root"></div>
<div id="toast"></div>

<script type="module">
import { h, render, createContext } from 'https://esm.sh/preact@10.23.2';
import { useState, useEffect, useContext, useRef, useMemo, useCallback } from 'https://esm.sh/preact@10.23.2/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ helpers ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
let onUnauth = () => {};
async function api(path, opts){
  const r = await fetch('/admin/api/'+path, Object.assign({credentials:'same-origin',headers:{'content-type':'application/json'}}, opts||{}));
  if(r.status===401){ onUnauth(); const e=new Error('unauthorized'); e.status=401; throw e; }
  const t = await r.text(); let j=null; try{j=JSON.parse(t);}catch{}
  if(!r.ok) throw new Error((j&&j.error)||('HTTP '+r.status));
  return j;
}
function toast(msg,bad){ const t=document.getElementById('toast'); t.textContent=msg; t.style.borderColor=bad?'var(--red)':'var(--grn)'; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
const clone = o => JSON.parse(JSON.stringify(o==null?{}:o));
const nfmt = n => { n=+n||0; if(n>=1e9)return (n/1e9).toFixed(2)+'B'; if(n>=1e6)return (n/1e6).toFixed(2)+'M'; if(n>=1e3)return (n/1e3).toFixed(1)+'k'; return ''+Math.round(n); };
const usd = n => { n=+n||0; if(n===0)return '$0'; if(n<0.01)return '<$0.01'; return '$'+n.toFixed(n<10?2:0); };
const ago = ts => { if(!ts)return 'ŌĆö'; const s=(Date.now()-ts)/1000; if(s<60)return Math.round(s)+'s'; if(s<3600)return Math.round(s/60)+'m'; if(s<86400)return Math.round(s/3600)+'h'; return Math.round(s/86400)+'d'; };
const fmtMs = ms => { if(ms==null)return 'ŌĆö'; return ms>=1000?(ms/1000).toFixed(ms>=10000?0:1)+'s':Math.round(ms)+'ms'; };
const fmtTime = ts => new Date(ts).toISOString().replace('T',' ').slice(5,19);
const SLOW_MS = 30000;
const laneCls = {local:'local',crazyrouter:'crazyrouter',wrappy:'wrappy',cloud:'crazyrouter',claude:'wrappy',blocked:'down'};
const PALETTE = ['#3b82f6','#22c55e','#f97316','#f59e0b','#a855f7','#ef4444','#06b6d4','#eab308','#84cc16','#ec4899'];
const LANE_COLOR = {local:'#22c55e',crazyrouter:'#3b82f6',wrappy:'#f97316',blocked:'#ef4444',images:'#a855f7'};
const seriesColor = (name,i) => LANE_COLOR[name]||PALETTE[i%PALETTE.length];

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ icons ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const ICON = {
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>',
  list:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
  chart:'<path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="8" rx="1"/><rect x="12" y="6" width="3" height="12" rx="1"/><rect x="17" y="13" width="3" height="5" rx="1"/>',
  route:'<circle cx="6" cy="19" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M8 19h6.5a3.5 3.5 0 0 0 0-7h-4a3.5 3.5 0 0 1 0-7H16"/>',
  box:'<path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M3 7l9 5 9-5"/><path d="M12 12v10"/>',
  cloud:'<path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.6 1.6A3.5 3.5 0 0 0 6.5 19z"/>',
  key:'<circle cx="8" cy="15" r="4"/><path d="M10.85 12.15 19 4M18 5l2 2M15 6l2 2"/>',
};
const Svg = ({n}) => html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" dangerouslySetInnerHTML=${{__html:ICON[n]||''}}></svg>`;

const NAV = [
  {sec:'Monitor'},
  {name:'Overview',slug:'overview',icon:'grid'},
  {name:'Calls',slug:'calls',icon:'list'},
  {name:'Stats',slug:'stats',icon:'chart'},
  {sec:'Control'},
  {name:'Routing',slug:'routing',icon:'route'},
  {name:'Models & test',slug:'models',icon:'box'},
  {sec:'Cloud & keys'},
  {name:'Crazyrouter',slug:'crazyrouter',icon:'cloud'},
  {name:'Secrets',slug:'secrets',icon:'key'},
];
const BASE='/admin';
const slugFor = n => (NAV.find(x=>x.name===n)||{}).slug||'overview';
const nameFor = s => (NAV.find(x=>x.slug===s)||{}).name||'Overview';

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ shared UI atoms ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const Pill = ({cls,children}) => html`<span class="pill ${cls||''}">${children}</span>`;
const LanePill = ({lane}) => html`<${Pill} cls=${laneCls[lane]||''}>${lane||'?'}<//>`;
const StatusPill = ({status,error}) => {
  const refusal = status>=400 && /^json_validation_failed/.test(error||'');
  if(refusal) return html`<${Pill} cls="warnp">­¤Öģ ${status}<//>`;
  if(status>=400) return html`<${Pill} cls="down">${status}<//>`;
  return html`<${Pill} cls="up">${status||'ŌĆö'}<//>`;
};
const KV = ({n,children}) => html`<div class="kv"><div class="n">${n}</div><div class="v">${children}</div></div>`;
const Card = ({cls,children}) => html`<div class="card ${cls||''}">${children}</div>`;

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ stacked-bar time chart ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const METRIC_LABEL = {tok:'tokens',n:'calls',err:'errors'};
function buildChart(d, metric, opts){
  const pts=d.points||[], series=d.series||[]; const H=opts.H||240;
  const bm=d.bucketMs, bl=bm>=86400000?(bm/86400000+'d'):bm>=3600000?(bm/3600000+'h'):(bm/60000+'min');
  const hint=`ŌĆö ${METRIC_LABEL[metric]} per ${bl} bucket${opts.by?', '+opts.by:''}`;
  if(!pts.length) return {svg:'<span class="mut">no data in window</span>',hint,legend:[]};
  const W=Math.max(560,pts.length*16+60), padL=52, padB=22, padT=10, plotH=H-padB-padT, plotW=W-padL-10;
  const field=metric==='tok'?'tok':'n';
  const stackVal=(p,name)=>metric==='err'?(name==='__err'?p.totalErr:0):(p[field][name]||0);
  const useSeries=metric==='err'?['__err']:series;
  const totals=pts.map(p=>useSeries.reduce((a,nm)=>a+stackVal(p,nm),0));
  const maxV=Math.max(1,...totals);
  const bw=Math.max(4,Math.min(26,(plotW/pts.length)-3));
  const x=i=>padL+i*(plotW/pts.length)+(plotW/pts.length-bw)/2;
  let g=''; for(let i=0;i<=4;i++){const yy=padT+plotH-(i/4*plotH);const vv=maxV*i/4;g+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-10}" y2="${yy.toFixed(1)}" stroke="#26262b"/><text x="${padL-6}" y="${(yy+3).toFixed(1)}" fill="#a1a1aa" font-size="10" text-anchor="end">${nfmt(vv)}</text>`;}
  let bars='';
  pts.forEach((p,i)=>{ let yacc=padT+plotH;
    useSeries.forEach((nm)=>{ const v=stackVal(p,nm); if(v<=0)return; const hh=v/maxV*plotH; yacc-=hh;
      const c=metric==='err'?'#ef4444':seriesColor(nm,series.indexOf(nm));
      bars+=`<rect x="${x(i).toFixed(1)}" y="${yacc.toFixed(1)}" width="${bw.toFixed(1)}" height="${hh.toFixed(1)}" fill="${c}" rx="1"><title>${fmtTime(p.t)}\n${nm==='__err'?'errors':nm}: ${v.toLocaleString()}</title></rect>`;
    });
  });
  let xl=''; const step=Math.max(1,Math.ceil(pts.length/6));
  pts.forEach((p,i)=>{ if(i%step)return; const t=new Date(p.t); const lab=bm<3600000?t.toISOString().slice(11,16):t.toISOString().slice(5,16).replace('T',' '); xl+=`<text x="${(x(i)+bw/2).toFixed(1)}" y="${H-6}" fill="#a1a1aa" font-size="10" text-anchor="middle">${lab}</text>`; });
  const svg=`<svg width="${W}" height="${H}" style="max-width:none">${g}${bars}${xl}</svg>`;
  const legend=metric==='err'?[{name:'errors',color:'#ef4444'}]:series.map((nm,i)=>({name:nm,color:seriesColor(nm,i)}));
  return {svg,hint,legend};
}
const Chart = ({data,metric,by,H}) => {
  const {svg,hint,legend}=useMemo(()=>buildChart(data,metric,{by,H}),[data,metric,by,H]);
  return html`<div>
    <div style="overflow-x:auto" dangerouslySetInnerHTML=${{__html:svg}}></div>
    <div class="flex" style="gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px">
      ${legend.map(l=>html`<span><span class="swatch" style="background:${l.color}"></span>${l.name}</span>`)}
    </div>
    <div class="mut" style="font-size:12px;margin-top:2px">${hint}</div>
  </div>`;
};
const Seg = ({items,val,onChange}) => html`<div class="seg">
  ${items.map(([v,l])=>html`<button class=${v===val?'on':''} onClick=${()=>onChange(v)}>${l}</button>`)}
</div>`;

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ app context ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ OVERVIEW ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function Overview(){
  const {state,openCall} = useApp();
  const [health,setHealth]=useState(null);
  const [st1h,setSt1h]=useState(null);
  const [recent,setRecent]=useState(null);
  const [series,setSeries]=useState(null);
  const [ovWin,setOvWin]=useState('6h');
  const [ovMetric,setOvMetric]=useState('n');
  const [cfgOpen,setCfgOpen]=useState(false);
  const load=useCallback(async()=>{

function Issues({health,st,state}){
  const probs=[];
  ['local','wrappy','crazyrouter'].forEach(l=>{ const r=health[l]; if(r&&!r.up) probs.push(['down',`Lane ${l} is DOWN (status ${r.status||'ŌĆö'}). Traffic to it will fail.`]); });
  if(st&&st.byLane){
    st.byLane.forEach(r=>{ if(r.avg_ms>SLOW_MS) probs.push(['slow',`Lane ${r.lane} is slow ŌĆö avg ${fmtMs(r.avg_ms)} over the last hour (${r.n} calls).`]); });
    if(st.windowJsonFails>0) probs.push(['refusal',`${st.windowJsonFails} JSON-enforce failure(s) in the last hour ŌĆö usually a prose refusal, surfaced as 422. Not a proxy bug.`]);
    const otherErr=st.windowErrors-(st.windowJsonFails||0); const rate=st.windowCalls>0?otherErr/st.windowCalls:0;
    if(rate>0.05 && st.windowCalls>=20) probs.push(['err',`Non-refusal error rate ${(rate*100).toFixed(0)}% over the last hour (${otherErr}/${st.windowCalls}).`]);
  }
  if(state.forceModel&&state.forceModel.enabled) probs.push(['force',`Force-model is ON ŌåÆ every request rewritten to ${state.forceModel.lane}/${state.forceModel.model}.`]);
  const ic={down:'Ōøö',slow:'­¤Éó',refusal:'­¤Öģ',err:'ŌÜĀ’ĖÅ',force:'ŌÅ╗'};
  if(!probs.length) return html`<div class="banner ok"><b style="color:var(--grn)">Ō£ō All healthy</b> <span class="mut">ŌĆö lanes up, no slow lanes or elevated errors in the last hour.</span></div>`;
  return html`<div class="banner bad"><b style="color:var(--amb)">${probs.length} thing${probs.length>1?'s':''} to look at</b>
    <ul style="margin:8px 0 0;padding-left:20px;list-style:none">${probs.map(([k,m])=>html`<li style="margin:5px 0">${ic[k]||'ŌĆó'} ${m}</li>`)}</ul></div>`;
}

function ProjectTable({s,sort,setSort,go,setCallsProject}){
  const rows=[...(s.byProject||[])]; const maxT=Math.max(1,...rows.map(r=>r.tok||0));
  const k=sort.key,d=sort.dir;
  rows.sort((a,b)=>{ let x,y;
    if(k==='project'){return d*String(a.project||'').localeCompare(String(b.project||''));}
    if(k==='io'){x=a.ptok||0;y=b.ptok||0;} else if(k==='errors'){x=a.n?a.errors/a.n:0;y=b.n?b.errors/b.n:0;} else {x=a[k]||0;y=b[k]||0;}
    return d*((x>y?1:x<y?-1:0));
  });
  const cols=[['project','project'],['n','calls'],['tok','tokens'],['io','in ŌåÆ out'],['usd','est $'],['avg_ms','avg'],['errors','err%'],[null,'lanes'],['last','last seen'],[null,'share']];
  const onSort=key=>{ if(!key)return; setSort(sort.key===key?{key,dir:-sort.dir}:{key,dir:(key==='project'?1:-1)}); };
  return html`<table>
    <tr>${cols.map(([key,lbl])=>html`<th class=${key?'sortable '+(key===k?'on':''):''} onClick=${()=>onSort(key)}>${lbl}${key===k?(d<0?' Ō¢Š':' Ō¢┤'):''}</th>`)}</tr>
    ${rows.map(r=>{ const errPct=r.n>0?(r.errors/r.n*100):0; const share=r.tok/maxT*100;
      let badge=null; if(r.limit&&r.limitPct!=null){ const sp=r.limit.slowPct||95; const col=r.limitPct>=100?'var(--red)':r.limitPct>=sp?'var(--amb)':'#22c55e'; const cap=r.limit.tokens>0?nfmt(r.limit.tokens)+' tok':r.limit.calls>0?r.limit.calls+' calls':'';
        badge=html` <span class="chip" title=${r.limitPct+'% of '+cap+'/'+r.limit.window+' ┬Ę at 100%: '+r.limit.hard} style="color:${col};border-color:${col}">${r.limitPct}% ${r.limit.hard==='block'?'­¤Ü½':r.limit.hard==='slow'?'­¤Éó':'ŌÜĀ'}</span>`; }
      return html`<tr class="click" onClick=${()=>{ setCallsProject((r.project&&r.project!=='(none)')?r.project:''); go('calls'); }}>
        <td class="mono" style="font-size:12px">${r.project||'(none)'}${badge}</td>
        <td class="mono">${r.n}</td><td class="mono">${(r.tok||0).toLocaleString()}</td>
        <td class="mono mut" style="font-size:12px">${nfmt(r.ptok)} ŌåÆ ${nfmt(r.ctok)}</td>
        <td class="mono">${usd(r.usd)}</td><td class="mono">${fmtMs(r.avg_ms)}</td>
        <td class="mono" style=${r.errors>0?'color:var(--red);font-weight:700':'color:var(--mut)'}>${errPct.toFixed(errPct&&errPct<10?1:0)}%</td>
        <td style="font-size:11px">${String(r.lanes||'').split(',').join(' ')}</td>
        <td class="mono mut" style="font-size:11px">${ago(r.last)}</td>
        <td><span class="bar"><i style="width:${share.toFixed(1)}%;background:var(--acc)"></i></span></td>
      </tr>`; })}

function RuleSelect({cur,onChange}){
  const sel=ruleToVal(cur); const extra=(cur&&!cur.block&&!PROJ_MODELS.some(p=>p.lane===cur.lane&&p.model===cur.model));
  return html`<select value=${sel} onChange=${e=>onChange(valToRule(e.target.value))} style="flex:1">
    <option value="">ŌĆö auto (normal routing) ŌĆö</option>
    <option value=${BLOCK_VAL}>­¤Ü½ block ŌĆö reject (0 tokens)</option>
    ${extra&&html`<option value=${sel}>${cur.lane}: ${cur.model||"(keep caller's)"}</option>`}
    ${PROJ_MODELS.map(p=>{const v=`${p.lane}|${p.model}`; return html`<option value=${v}>${p.lane}: ${p.model}</option>`;})}
  </select>`;
}

    ${isDef?html`<td><b>Ōśģ default</b><div class="hint">all attributed projects</div></td>`:html`<td class="mono">${name}</td>`}
    <td><select value=${l.window||'24h'} onChange=${e=>g('window',e.target.value)}>${LIM_WINDOWS.map(w=>html`<option>${w}</option>`)}</select></td>
    <td>${num('tokens','100px')}</td><td>${num('calls','78px')}</td>

    <td>${num('slowMs','62px')}</td>
    <td><select value=${l.hard||'block'} onChange=${e=>g('hard',e.target.value)}>${LIM_HARD.map(([v,lb])=>html`<option value=${v}>${lb}</option>`)}</select></td>
    <td>${isDef?'':html`<button class="ghost" onClick=${onRm}>Ō£Ģ</button>`}</td>
  </tr>`;
}

    try{ const r=await api('test',{method:'POST',body:JSON.stringify({model,prompt:tp})}); setOut(`lane=${r.lane} sent=${r.sentModel} status=${r.status} ${r.ms}ms\n`+(r.content!=null?('\n'+r.content):('\n[no content]\n'+(r.error||r.raw||'')))); }

    return html`<div style="margin:10px 0 4px"><${Pill} cls=${cls}>${title}<//> <span class="mut">${items.length}</span></div>${items.map(m=>html`<div style="padding:3px 0">${m.id} <span class="mut">┬Ę ${m.owned_by||''}</span></div>`)}`; };
  return html`
  <${PageHead} title="Models & test"/>
  <${Card}>
    <h3>Test a model <small class="hint">ŌĆö runs a real chat completion through current routing</small></h3>
    <div class="row">
      <input list="modellist" style="flex:2" placeholder="model e.g. local / claude-sonnet-4-6 / gemini-2.5-pro" value=${tm} onInput=${e=>setTm(e.target.value)}/>
      <button style="flex:0 0 auto" onClick=${runTest}>Run</button>
    </div>
    <datalist id="modellist">${all.map(m=>html`<option value=${m.id}></option>`)}</datalist>
    <input placeholder="prompt" value=${tp} onInput=${e=>setTp(e.target.value)} style="margin-top:8px"/>
    ${out!=null&&html`<pre>${out}</pre>`}
  </${Card}>
  <${Card}>
    <h3>Available models ${models?html`<span class="mut">(local ${models.local.length} ┬Ę wrappy ${models.wrappy.length} ┬Ę crazyrouter ${models.crazyrouter.length})</span>`:''}</h3>
    <input placeholder="filterŌĆ”" value=${filter} onInput=${e=>setFilter(e.target.value)} style="margin-bottom:8px"/>
    <div class="mono" style="max-height:420px;overflow:auto">${models?html`${sec('local','local',models.local)}${sec('wrappy','wrappy',models.wrappy)}${sec('crazyrouter','crazyrouter',models.crazyrouter)}`:html`<span class="mut">loadingŌĆ”</span>`}</div>
  </${Card}>`;
}

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ CRAZYROUTER ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function Crazyrouter(){
  const {reload}=useApp();
  const [c,setC]=useState(null); const [nk,setNk]=useState(''); const [test,setTest]=useState(null);
  const load=useCallback(async()=>{ setC('loading'); try{ setC(await api('crazyrouter')); }catch(e){ setC(null); } },[]);
  useEffect(()=>{load();},[load]);
  async function testKey(){ const key=nk.trim(); if(!key){toast('paste a key',true);return;} setTest('testingŌĆ”');
    try{ const r=await api('crazyrouter/test',{method:'POST',body:JSON.stringify({key})}); setTest(JSON.stringify(r,null,2)); toast(r.keyValid?'key is VALID ŌĆö click Save key':'key is INVALID',!r.keyValid); }catch(e){ setTest('error: '+e.message); } }
  async function saveKey(){ const key=nk.trim(); if(!key){toast('paste a key',true);return;} try{ const r=await api('config',{method:'POST',body:JSON.stringify({crazyrouterKey:key})}); reload(r.state); setNk(''); toast('key saved (live)'); load(); }catch(e){toast(e.message,true);} }
  return html`
  <${PageHead} title="Crazyrouter (cloud lane)" onRefresh=${load}/>
  <${Card}>
    ${c==='loading'||c==null?html`<div class="mut">${c==null?'unavailable':'checkingŌĆ”'}</div>`:html`
    <div class="grid">
      <${KV} n="Key">${c.keySet?(c.keyValid?html`<span class="up">valid</span>`:html`<span class="down">INVALID</span>`):html`<span class="down">not set</span>`}<//>
      <${KV} n="Limit">${c.hardLimitUsd!=null?'$'+c.hardLimitUsd:'ŌĆö'}<//>
      <${KV} n="Used">${c.totalUsageUsd!=null?'$'+c.totalUsageUsd.toFixed(2):'ŌĆö'}<//>
      <${KV} n="Remaining">${c.remainingUsd!=null?'$'+c.remainingUsd.toFixed(2):'ŌĆö'}<//>
      <${KV} n="Models">${c.modelCount??'ŌĆö'}<//>
      <${KV} n="Key id">${c.keyMasked||'(none)'}<//>
    </div>
    ${(c.message||!c.keyValid)&&html`<p class="warn" style="margin-top:12px">${(c.message||'key check failed')+(c.statuses?' ┬Ę statuses '+JSON.stringify(c.statuses):'')}</p>`}`}
  </${Card}>
  <${Card}>
    <h3>Update key <small class="hint">ŌĆö paste a new <code>sk-</code> key; test it before saving</small></h3>
    <input placeholder="sk-ŌĆ”" value=${nk} onInput=${e=>setNk(e.target.value)}/>
    <div class="flex" style="margin-top:10px"><button class="ghost" onClick=${testKey}>Test key</button><button onClick=${saveKey}>Save key (live, no redeploy)</button></div>
    ${test!=null&&html`<pre>${test}</pre>`}
  </${Card}>`;
}

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ SECRETS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function Secrets(){
  const {state,reload}=useApp();
  const [v,setV]=useState({claude:'',oblit:'',admin:''});
  async function setSecret(field,val){ if(!val){toast('enter a value',true);return;} try{ const r=await api('config',{method:'POST',body:JSON.stringify({[field]:val})}); reload(r.state); toast(field+' updated'); }catch(e){toast(e.message,true);} }
  async function disableGate(){ if(!confirm('Disable the gate? Gated models become open to anyone.'))return; try{ const r=await api('config',{method:'POST',body:JSON.stringify({oblitToken:''})}); reload(r.state); toast('gate disabled'); }catch(e){toast(e.message,true);} }
  async function changePw(){ if(v.admin.length<3){toast('min 3 chars',true);return;} if(!confirm('Change admin password? You may need to sign in again.'))return; try{ await api('config',{method:'POST',body:JSON.stringify({adminPassword:v.admin})}); setV({...v,admin:''}); toast('password changed ŌĆö re-login if prompted'); }catch(e){toast(e.message,true);} }
  return html`
  <${PageHead} title="Secrets & gate"/>
  <div class="warn">Live, file-backed overrides (<code>${state.configFile}</code>). Leaving a field blank keeps the current value.</div>
  <${Card}>
    <h3>Wrappy lane token <small class="hint">(claudebox @ claude.hostbun.cc)</small> <span class="mut">(current: ${state.wrappyTokenMasked||'(none)'})</span></h3>
    <div class="flex"><input type="password" placeholder="new wrappy token" value=${v.claude} onInput=${e=>setV({...v,claude:e.target.value})}/><button class="sm" style="flex:0 0 auto" onClick=${()=>{setSecret('wrappyToken',v.claude);setV({...v,claude:''});}}>Update</button></div>
  </${Card}>
  <${Card}>
    <h3>Obliterated / uncensored gate <span class="mut">(token: ${state.oblitTokenSet?state.oblitTokenMasked:'(open ŌĆö no gate)'})</span></h3>
    <p class="mut" style="font-size:13px;margin:0 0 8px">When set, requests to a gated model require <code>Authorization: Bearer &lt;token&gt;</code>. Empty = open.</p>
    <div class="flex"><input type="password" placeholder="new gate token" value=${v.oblit} onInput=${e=>setV({...v,oblit:e.target.value})}/><button class="sm" style="flex:0 0 auto" onClick=${()=>{setSecret('oblitToken',v.oblit);setV({...v,oblit:''});}}>Update</button><button class="danger sm" style="flex:0 0 auto" onClick=${disableGate}>Disable gate</button></div>
    <small class="hint">Gated upstream model ids are edited on the Routing page (Advanced ŌåÆ JSON enforcement).</small>
  </${Card}>
  <${Card}>
    <h3>Admin password <span class="mut">(current: ${state.adminPasswordMasked})</span></h3>
    <div class="flex"><input type="password" placeholder="new admin password (Ōēź3 chars)" value=${v.admin} onInput=${e=>setV({...v,admin:e.target.value})}/><button class="sm danger" style="flex:0 0 auto" onClick=${changePw}>Change</button></div>
    <small class="hint">changing this signs you out of other sessions.</small>
  </${Card}>`;
}

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ shared page header ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const PageHead = ({title,onRefresh}) => html`<div class="flex" style="justify-content:space-between;margin-bottom:6px"><h2>${title}</h2>${onRefresh&&html`<button class="ghost sm" onClick=${onRefresh}>Ōå╗ Refresh</button>`}</div>`;

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ call drawer ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function CallDrawer({id,onClose}){
  const [c,setC]=useState(null);
  useEffect(()=>{ if(id==null){setC(null);return;} setC('loading');
    (async()=>{ try{ setC(await api('call?id='+id)); }catch(e){ setC({error:e.message}); } })();
  },[id]);
  useEffect(()=>{ const h=e=>{ if(e.key==='Escape')onClose(); }; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); },[onClose]);
  const open=id!=null;
  const copy=()=>{ if(c&&typeof c==='object'&&!c.error) navigator.clipboard.writeText(JSON.stringify(c,null,2)).then(()=>toast('copied call JSON')); };
  return html`
  <div class=${'dov'+(open?' open':'')} onClick=${onClose}></div>
  <aside class=${'drawer'+(open?' open':'')} aria-hidden=${!open}>
    <div class="drawer-hd">
      <div style="font-weight:600">${c&&c.id?html`Call #${c.id} <${StatusPill} status=${c.status} error=${c.error}/> <${LanePill} lane=${c.lane}/>`:'Call'}</div>
      <span style="flex:1"></span>
      <button class="ghost sm" onClick=${copy}>Copy JSON</button>
      <button class="ghost sm" onClick=${onClose}>Ō£Ģ</button>
    </div>
    <div class="drawer-bd">
      ${c==null||c==='loading'?html`<span class="mut">${c==='loading'?'loadingŌĆ”':''}</span>`
      : c.error?html`<span class="down">error: ${c.error}</span>`
      : html`
      <div class="dsec"><div class="dmeta">
        <${KV} n="when">${fmtTime(c.ts)}<//>
        <${KV} n="project">${c.project||'(none)'}<//>
        <${KV} n="model">${c.req_model||'-'}${c.sent_model&&c.sent_model!==c.req_model?html` <span class="mut">ŌåÆ ${c.sent_model}</span>`:''}<//>
        <${KV} n="key">${c.key_label||'ŌĆö'}<//>
        <${KV} n="latency">${fmtMs(c.duration_ms)}<//>
        <${KV} n="stream">${c.stream?'yes':'no'}<//>
        <${KV} n="tokens">${c.prompt_tokens??'?'} ŌåÆ ${c.completion_tokens??'?'} <span class="mut">(${c.total_tokens??'?'})</span><//>
        <${KV} n="ip">${c.ip||'ŌĆö'}<//>
      </div></div>
      ${c.error&&html`<div class="dsec"><div class="dlbl" style="color:var(--red)">error</div><div class="msgbox" style="color:var(--red)">${c.error}</div></div>`}
      <div class="dsec"><div class="dlbl">prompt</div><div class="msgbox">${c.req_content||'(not stored)'}</div></div>
      <div class="dsec"><div class="dlbl">reply</div><div class="msgbox">${c.resp_content||'(not stored)'}</div></div>
      ${c.ua&&html`<div class="dsec"><div class="dlbl">user agent</div><div class="msgbox" style="max-height:none">${c.ua}</div></div>`}
      `}
    </div>
  </aside>`;
}

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ shell ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const PAGES={overview:Overview,calls:Calls,stats:Stats,routing:Routing,models:Models,crazyrouter:Crazyrouter,secrets:Secrets};
function Shell({slug,go,children}){
  const [sbOpen,setSbOpen]=useState(false);
  return html`<div class="shell">
    <aside class=${'sidebar'+(sbOpen?' open':'')}>
      <div class="sb-brand"><div class="logo">hb</div><div><div class="t">hostbun</div><div class="s">llm proxy ┬Ę admin</div></div></div>
      <nav class="nav">
        ${NAV.map(it=>it.sec?html`<div class="nav-sec">${it.sec}</div>`:html`
          <a class=${'nav-item'+(it.slug===slug?' on':'')} href=${BASE+'/'+it.slug} onClick=${e=>{e.preventDefault();go(it.slug);setSbOpen(false);}}>
            <${Svg} n=${it.icon}/><span>${it.name}</span>
          </a>`)}
      </nav>
      <div class="sb-foot"><button class="ghost sm" style="width:100%" onClick=${async()=>{ try{await api('logout',{method:'POST'});}catch{} location.reload(); }}>Sign out</button></div>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="ghost sm hamb" onClick=${()=>setSbOpen(!sbOpen)}>Ōś░</button>
        <span class="crumb">Admin <span style="opacity:.5">/</span></span><h2 style="font-size:16px">${nameFor(slug)}</h2>
      </header>
      <div class="content">${children}</div>
    </div>
  </div>`;
}

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ login ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function Login({onOk}){
  const [pw,setPw]=useState(''); const [err,setErr]=useState('');
  async function submit(){ setErr(''); try{ await api('login',{method:'POST',body:JSON.stringify({password:pw})}); onOk(); }catch(e){ setErr(e.message); } }
  return html`<div class="login">
    <div class="sb-brand" style="justify-content:center;border:0;margin:0 0 8px;padding:0"><div class="logo">hb</div></div>
    <h1 style="font-size:20px">llm.hostbun.cc</h1>
    <p class="mut">admin panel</p>
    <div class="card">
      <input type="password" placeholder="password" autofocus value=${pw} onInput=${e=>setPw(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&submit()}/>
      <div style="height:10px"></div>
      <button style="width:100%" onClick=${submit}>Sign in</button>
      ${err&&html`<p class="down" style="margin:10px 0 0;font-size:13px">${err}</p>`}
    </div>
  </div>`;
}

/* ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ root ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function App(){
  const [authed,setAuthed]=useState(null); // null=checking
  const [state,setState]=useState(null);
  const [slug,setSlug]=useState(()=>{ let s=location.pathname.replace(BASE,'').replace(/^\/+/,'').split('/')[0]||'overview'; return NAV.some(x=>x.slug===s)?s:'overview'; });
  const [callId,setCallId]=useState(null);
  const callsProjectRef=useRef('');
  const boot=useCallback(async()=>{ try{ const s=await api('state'); setState(s); setAuthed(true); }catch(e){ setAuthed(false); } },[]);
  useEffect(()=>{ onUnauth=()=>setAuthed(false); boot(); },[boot]);
  useEffect(()=>{ const h=()=>{ let s=location.pathname.replace(BASE,'').replace(/^\/+/,'').split('/')[0]||'overview'; setSlug(NAV.some(x=>x.slug===s)?s:'overview'); }; window.addEventListener('popstate',h); return ()=>window.removeEventListener('popstate',h); },[]);
  const go=useCallback(s=>{ history.pushState({},'',BASE+'/'+s); setSlug(s); document.title='hostbun ┬Ę '+nameFor(s); },[]);
  useEffect(()=>{ document.title='hostbun ┬Ę '+nameFor(slug); },[slug]);
  const reload=useCallback(s=>{ if(s)setState(s); else boot(); },[boot]);

  if(authed===null) return html`<div class="mut" style="padding:40px;text-align:center">ŌĆ”</div>`;
  if(!authed) return html`<${Login} onOk=${boot}/>`;
  if(!state) return html`<div class="mut" style="padding:40px;text-align:center">loadingŌĆ”</div>`;
  const Page=PAGES[slug]||Overview;
  const ctx={ state, reload, go, openCall:setCallId, setCallsProject:v=>{callsProjectRef.current=v; try{const u=new URL(location.href);u.searchParams.set('project',v);history.replaceState({},'',u);}catch{}}, callsProjectRef };
  return html`<${Ctx.Provider} value=${ctx}>
    <${Shell} slug=${slug} go=${go}><${Page}/></${Shell}>
    <${CallDrawer} id=${callId} onClose=${()=>setCallId(null)}/>
  </${Ctx.Provider}>`;
}
render(html`<${App}/>`, document.getElementById('root'));
</script>
</body></html>
